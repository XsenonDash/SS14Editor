<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS14 Prototype Editor</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Custom application header (replaces the native Electron menu bar
         AND the native window chrome — the BrowserWindow is frameless and
         this header carries the drag region plus minimize/maximize/close
         controls on the right). Lives outside #app so it spans full width. -->
    <header id="app-header">
        <div class="app-header-brand">
            <img class="app-header-brand-icon" src="img/icon.png" alt="" draggable="false">
            <span class="app-header-brand-text">SS14 Editor</span>
        </div>
        <nav class="app-header-menus">
            <div class="app-header-menu" data-menu="project">
                <button class="app-header-menu-btn" type="button">Project</button>
                <div class="app-header-menu-dropdown">
                    <button class="app-header-dropdown-item" id="hdr-open-other" type="button">Open other repository</button>
                </div>
            </div>
            <!-- Update button sits next to the menu items (not pushed right) and
                 is hidden until the Electron main process pushes `update-available`. -->
            <button id="hdr-update-btn" class="app-header-update" type="button" hidden>
                <span class="app-header-update-label">Update</span>
            </button>
        </nav>
        <div class="app-header-spacer"></div>
        <div class="app-header-window-controls" id="hdr-window-controls">
            <button class="app-header-winbtn" id="hdr-win-min" type="button" title="Minimize" aria-label="Minimize">
                <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true"><path d="M0 5 H10" stroke="currentColor" stroke-width="1"/></svg>
            </button>
            <button class="app-header-winbtn" id="hdr-win-max" type="button" title="Maximize" aria-label="Maximize">
                <svg class="ico-max" width="10" height="10" viewBox="0 0 10 10" aria-hidden="true"><rect x="0.5" y="0.5" width="9" height="9" stroke="currentColor" stroke-width="1" fill="none"/></svg>
                <svg class="ico-restore" width="10" height="10" viewBox="0 0 10 10" aria-hidden="true"><rect x="0.5" y="2.5" width="7" height="7" stroke="currentColor" stroke-width="1" fill="none"/><path d="M2.5 2.5 V0.5 H9.5 V7.5 H7.5" stroke="currentColor" stroke-width="1" fill="none"/></svg>
            </button>
            <button class="app-header-winbtn app-header-winbtn-close" id="hdr-win-close" type="button" title="Close" aria-label="Close">
                <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true"><path d="M0 0 L10 10 M10 0 L0 10" stroke="currentColor" stroke-width="1"/></svg>
            </button>
        </div>
    </header>

    <div id="app">
        <!-- Activity bar: narrow icon strip on the far left (VSCode-style).
             Each button activates a named side-panel. -->
        <div id="activity-bar">
            <button class="activity-btn active" data-panel="files" title="Explorer">
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
                    <rect x="3" y="5" width="9" height="12" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
                    <rect x="7" y="3" width="9" height="12" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
                </svg>
            </button>
        </div>

        <aside id="sidebar">
            <!-- Files panel (first and currently only side panel) -->
            <div id="panel-files" class="side-panel active">
                <div class="panel-header">Explorer</div>
                <div class="sidebar-search">
                    <input type="text" id="file-search" placeholder="Search files & prototype IDs…" spellcheck="false">
                </div>
                <div id="file-tree" class="file-tree"></div>
            </div>
        </aside>

        <!-- Drag handle between sidebar and main editor area -->
        <div id="sidebar-resizer" title="Drag to resize panel"></div>

        <main id="main">
            <div id="editor-groups"></div>
        </main>
    </div>

    <div id="toast-container"></div>

    <div id="status-bar">
        <span id="status-bar-version"></span>
    </div>

    <!-- Setup overlay: shown when no SS14 project is configured yet -->
    <div id="setup-overlay" class="setup-overlay" style="display:none">
        <div class="setup-card">
            <img class="setup-logo" src="img/icon.png" alt="" draggable="false">
            <h1 class="setup-title">SS14 Prototype Editor</h1>
            <p class="setup-desc">Enter the path to your SS14 project folder to begin.<br>
                The project must be built first — run <code>dotnet build</code> in it.</p>
            <div class="setup-input-row">
                <input type="text" id="setup-path" class="setup-input"
                       placeholder="C:\repos\my-ss14-fork" spellcheck="false" autocomplete="off">
                <button id="setup-browse-btn" class="setup-btn setup-btn-icon" title="Browse for folder…" aria-label="Browse for folder">📁</button>
                <button id="setup-open-btn" class="setup-btn">Open</button>
            </div>
            <div id="setup-history" class="setup-history"></div>
            <div id="setup-status" class="setup-status"></div>
        </div>
    </div>

    <script src="js/yaml-lib.js"></script>
    <!-- Modular JS – loaded in dependency order -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/state.js"></script>
    <script src="js/yaml.js"></script>
    <script src="js/api.js"></script>
    <script src="js/context-menu.js"></script>
    <script src="js/inheritance.js"></script>
    <script src="js/sprite-renderer.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/field-controls-paths.js"></script>
    <script src="js/field-controls-collections.js"></script>
    <script src="js/named-colors.js"></script>
    <script src="js/fields.js"></script>
    <script src="js/tabs.js"></script>
    <script src="js/file-tree.js"></script>
    <script src="js/editor-mutate.js"></script>
    <script src="js/editor-comments.js"></script>
    <script src="js/editor-render.js"></script>
    <script src="js/editor-cards.js"></script>
    <script src="js/editor-components.js"></script>
    <script src="js/editor-add.js"></script>
    <script src="js/app-header.js"></script>
    <script src="js/init.js"></script>
</body>
</html>
