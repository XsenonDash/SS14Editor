name: Testing

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore tests/ss14-editor.Tests/ss14-editor.Tests.csproj

      - name: Test
        run: dotnet test tests/ss14-editor.Tests/ss14-editor.Tests.csproj --nologo --verbosity normal
