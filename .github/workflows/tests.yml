name: Testing

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore
        run: dotnet restore tests/ss14-editor.Tests/ss14-editor.Tests.csproj

      - name: Test (JS yaml helpers)
        run: for f in tests/yaml/*.test.js; do echo "== $f =="; node "$f" || exit 1; done

      - name: Test (.NET)
        run: dotnet test tests/ss14-editor.Tests/ss14-editor.Tests.csproj --nologo --verbosity normal
