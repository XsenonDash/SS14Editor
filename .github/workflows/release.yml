name: Release

# Builds self-contained single-file binaries for all supported platforms
# and publishes them as a GitHub Release.
#
# Trigger:
#   - Push a tag like `v1.0.0`   -> auto-release
#   - Or trigger manually via "Run workflow" in the Actions tab

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            archive: zip
          - rid: linux-x64
            os: ubuntu-latest
            archive: tar
          - rid: osx-arm64
            os: macos-latest
            archive: tar

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Publish self-contained
        shell: bash
        run: |
          dotnet publish ss14-editor.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:DebugType=embedded \
            -o publish/${{ matrix.rid }}

      - name: Package (zip - Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "ss14-editor-${{ matrix.rid }}.zip"
          Compress-Archive -Path "publish/${{ matrix.rid }}/*" -DestinationPath $name
          echo "ARTIFACT=$name" >> $env:GITHUB_ENV

      - name: Package (tar.gz - Linux / macOS)
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          name="ss14-editor-${{ matrix.rid }}.tar.gz"
          chmod +x publish/${{ matrix.rid }}/ss14-editor || true
          tar -czf "$name" -C publish/${{ matrix.rid }} .
          echo "ARTIFACT=$name" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ss14-editor-${{ matrix.rid }}
          path: ${{ env.ARTIFACT }}
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*