name: Release

# Builds self-contained single-file binaries for all supported platforms
# and publishes them as a GitHub Release.
#
# Trigger:
#   - Push a tag like `v1.0.0`   -> auto-release
#   - Or trigger manually via "Run workflow" in the Actions tab

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            archive: zip
          - rid: linux-x64
            os: ubuntu-latest
            archive: tar
          - rid: osx-arm64
            os: macos-latest
            archive: tar

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Publish self-contained
        shell: bash
        run: |
          dotnet publish ss14-editor.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:DebugType=embedded \
            -p:InformationalVersion=${{ env.VERSION }} \
            -o publish/${{ matrix.rid }}

      - name: Package (zip - Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "ss14-editor-v${{ env.VERSION }}-${{ matrix.rid }}.zip"
          Compress-Archive -Path "publish/${{ matrix.rid }}/*" -DestinationPath $name
          echo "ARTIFACT=$name" >> $env:GITHUB_ENV

      - name: Package (tar.gz - Linux / macOS)
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          name="ss14-editor-v${{ env.VERSION }}-${{ matrix.rid }}.tar.gz"
          chmod +x publish/${{ matrix.rid }}/ss14-editor || true
          tar -czf "$name" -C publish/${{ matrix.rid }} .
          echo "ARTIFACT=$name" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ss14-editor-${{ matrix.rid }}
          path: ${{ env.ARTIFACT }}
          retention-days: 7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare server binary for Electron
        shell: bash
        run: |
          mkdir -p publish/server
          cp -r "publish/${{ matrix.rid }}/." publish/server/

      - name: Set package.json version
        shell: bash
        run: |
          # electron-builder requires strict 3-part semver; strip any 4th component
          SEMVER=$(echo "${{ env.VERSION }}" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          cd electron && npm pkg set version="$SEMVER"

      - name: Build Electron app
        shell: bash
        run: |
          cd electron
          npm install
          npm run dist -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload Electron installer
        uses: actions/upload-artifact@v4
        with:
          name: ss14-editor-electron-${{ matrix.rid }}
          path: |
            electron/dist/ss14-editor-v${{ env.VERSION }}-*
            electron/dist/latest*.yml
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*